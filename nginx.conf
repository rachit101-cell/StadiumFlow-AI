events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  gzip              on;
  gzip_types        text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_min_length   1000;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://generativelanguage.googleapis.com; img-src 'self' data:; frame-src 'none'; object-src 'none';"
      always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Cache: Static assets with content hash ───────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # ── SPA Fallback ─────────────────────────────────────────────────────────
    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Health check endpoint for Cloud Run ──────────────────────────────────
    location /health {
      access_log off;
      return 200 'StadiumFlow AI — healthy';
      add_header Content-Type text/plain;
    }
  }
}
